name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: 'stable'
          cache: true

      - name: 🔍 Verify Flutter
        run: flutter doctor -v

      - name: ✅ Accept Android Licenses
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          flutter doctor --android-licenses || true

      - name: 📚 Get dependencies
        run: flutter pub get

      - name: 📋 Show resolved dependency tree
        run: flutter pub deps

      - name: 🔍 Find v1 embedding references in plugins
        run: |
          echo "=== Searching for 'PluginRegistry.Registrar' in plugin sources ==="
          find $PUB_CACHE/hosted/pub.dev -name "*.java" -o -name "*.kt" 2>/dev/null | \
            xargs grep -l "PluginRegistry.Registrar" 2>/dev/null || echo "None found"
          echo ""
          echo "=== Searching for 'registerWith' in plugin sources ==="
          find $PUB_CACHE/hosted/pub.dev -name "*.java" -o -name "*.kt" 2>/dev/null | \
            xargs grep -l "registerWith" 2>/dev/null || echo "None found"
          echo ""
          echo "=== Searching for 'v1Embedding' in plugin sources ==="
          find $PUB_CACHE/hosted/pub.dev -name "*.java" -o -name "*.kt" 2>/dev/null | \
            xargs grep -l "v1Embedding\|V1Embedding\|v1_embedding" 2>/dev/null || echo "None found"
          echo ""
          echo "=== All Android plugin source files ==="
          find $PUB_CACHE/hosted/pub.dev -name "*.java" -o -name "*.kt" 2>/dev/null | sort

      - name: 🛠️ Build Android APK (capture output)
        id: build
        continue-on-error: true
        run: |
          flutter build apk --debug 2>&1 | tee build_output.txt
          echo "result=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: 📄 Show error details
        if: always()
        run: |
          cat build_output.txt
          echo ""
          echo "=== GREP FOR COMMON ERROR PATTERNS ==="
          grep -n "error:\|FAILED\|failed\|cannot find symbol\|Registrar\|PluginRegistry" build_output.txt || echo "No patterns found"

      - name: 📤 Upload APK artifact
        if: steps.build.outputs.result == '0'
        uses: actions/upload-artifact@v4
        with:
          name: hinglish-dictate-apk
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
