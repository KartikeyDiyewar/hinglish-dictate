name: hinglish_dictate
description: Hinglish speech-to-text dictation app. Floating overlay appears when keyboard is active.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Use latest versions that don't reference deleted Android v1 embedding
  speech_to_text: ^7.4.0
  permission_handler: ^12.0.3+1
  shared_preferences: ^2.3.4
  http: ^1.2.2
  vibration: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
