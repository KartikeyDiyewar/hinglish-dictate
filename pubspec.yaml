name: hinglish_dictate
description: Hinglish speech-to-text dictation app. Floating overlay appears when keyboard is active.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.2.0

dependencies:
  flutter:
    sdk: flutter

  # Speech recognition via device's built-in engine
  speech_to_text: ^6.6.2

  # Permissions (mic, overlay, notification)
  permission_handler: ^11.3.0

  # Local storage for API key and settings
  shared_preferences: ^2.2.3

  # HTTP for Gemini API calls
  http: ^1.2.1

  # Vibrate on recording start/stop (haptic feedback)
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
